<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-card { max-width: 520px; }
        .spinner-border-sm { width: 1rem; height: 1rem; }
    </style>
</head>
<body class="auth-bg">

<div class="auth-card">
    <div class="text-center mb-4">
        <img src="/img/logo.jpeg" alt="ALIVET" class="auth-logo">
        <h2 class="auth-title mt-2">Crear cuenta</h2>
        <p class="auth-subtitle">Únete a la familia ALIVET</p>
    </div>

    <form id="registroForm">

        <!-- Tipo y número de documento -->
        <div class="row mb-3 g-2">
            <div class="col-5">
                <label class="form-label">Tipo documento</label>
                <select class="form-select" id="tipoDocumento" required onchange="cambiarTipoDoc()">
                    <option value="">Seleccione...</option>
                    <option value="DNI">DNI</option>
                    <option value="RUC">RUC</option>
                </select>
            </div>
            <div class="col-7">
                <label class="form-label">Número de documento</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="numeroDocumento"
                           placeholder="Ingresa tu documento" required>
                    <button type="button" class="btn btn-outline-success"
                            onclick="consultarDocumento()" id="btn-consultar"
                            style="border-radius:0 10px 10px 0 !important;">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
                <small id="doc-estado" class="mt-1 d-block text-muted"></small>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombres</label>
            <input type="text" class="form-control" id="nombres"
                   placeholder="Se completará automáticamente" required>
        </div>

        <div class="row mb-3 g-2">
            <div class="col-6">
                <label class="form-label">Apellido Paterno</label>
                <input type="text" class="form-control" id="apellidoPaterno"
                       placeholder="Apellido paterno" required>
            </div>
            <div class="col-6">
                <label class="form-label">Apellido Materno</label>
                <input type="text" class="form-control" id="apellidoMaterno"
                       placeholder="Apellido materno" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo"
                   placeholder="usuario@correo.com" required>
        </div>

        <div class="row mb-4 g-2">
            <div class="col-6">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password"
                       placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="col-6">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" id="confirmarPassword"
                       placeholder="Repite tu contraseña" required>
            </div>
        </div>

        <button type="submit" class="btn btn-agro w-100 py-2 mb-3">
            <i class="bi bi-person-plus me-2"></i>Registrarse
        </button>
    </form>

    <div class="auth-divider"><span>¿Ya tienes cuenta?</span></div>

    <a href="/login.html" class="btn btn-outline-success w-100 py-2" style="border-radius:10px;">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
    </a>

    <div id="mensaje" class="alert d-none mt-3 rounded-3"></div>
</div>

<script src="/js/auth/registro.js"></script>
</body>
</html>
