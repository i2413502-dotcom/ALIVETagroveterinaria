<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: var(--agro-green);">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="/">🐄 AgroVeterinaria ALIVET</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4" style="color: var(--agro-green);">Nueva Contraseña</h3>
                        
                        <div id="mensaje" class="alert d-none"></div>
                        
                        <form id="formRestablecer">
                            <div class="mb-3">
                                <label for="password" class="form-label">Nueva contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmar" class="form-label">Confirmar contraseña</label>
                                <input type="password" class="form-control" id="confirmar" placeholder="Repite la contraseña" minlength="6" required>
                            </div>
                            <button type="submit" class="btn w-100 text-white" style="background-color: var(--agro-green);">
                                <i class="bi bi-shield-check"></i> Restablecer contraseña
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/restablecer.js"></script>
</body>
</html>
