<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: var(--agro-green);">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="/">🐄 AgroVeterinaria ALIVET</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4" style="color: var(--agro-green);">Recuperar Contraseña</h3>
                        <p class="text-muted text-center mb-4">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
                        
                        <div id="mensaje" class="alert d-none"></div>
                        
                        <form id="formRecuperar">
                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="tu@correo.com" required>
                            </div>
                            <button type="submit" class="btn w-100 text-white" style="background-color: var(--agro-green);">
                                <i class="bi bi-envelope"></i> Enviar enlace de recuperación
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="/login.html" class="text-decoration-none">← Volver al inicio de sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/recuperar.js"></script>
</body>
</html>
