<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Producto - AgroVeterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .product-img {
            width: 100%; max-width: 460px; border-radius: 18px;
            object-fit: cover; max-height: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .btn-agregar {
            background: linear-gradient(135deg, var(--agro-green), var(--agro-green-dark));
            color: white; border: none; border-radius: 10px;
            font-weight: 600; transition: transform 0.18s, box-shadow 0.2s;
        }
        .btn-agregar:hover {
            color: white; transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(6,160,73,0.40);
        }
        .cantidad-control { display: flex; align-items: center; gap: 10px; }
        .cantidad-control button {
            width: 34px; height: 34px; border-radius: 50%;
            border: 2px solid var(--agro-green); background: white;
            color: var(--agro-green); font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; cursor: pointer;
        }
        .cantidad-control button:hover { background: var(--agro-green); color: white; }
        .cantidad-control input {
            width: 62px; text-align: center;
            border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 6px;
        }
        .precio-detalle { font-size: 2rem; font-weight: 800; color: var(--agro-green-dark); }
        .recomendado-card { border-radius: 14px !important; transition: transform 0.25s, box-shadow 0.25s; }
        .recomendado-card:hover { transform: translateY(-5px); box-shadow: 0 10px 28px rgba(6,160,73,0.15) !important; }
    </style>
</head>
<body>

<header class="main-header shadow-sm">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
        <a href="/" class="text-decoration-none">
            <img src="/img/logo.jpeg" alt="Logo" style="height:70px;">
        </a>
        <div class="d-flex gap-4 align-items-center">
            <a href="/carrito.html" class="text-white position-relative">
                <i class="bi bi-cart3 fs-4"></i>
                <span id="cart-count" class="badge-carrito">0</span>
            </a>
            <a href="/login.html" class="text-white" id="btn-usuario">
                <i class="bi bi-person-circle fs-4"></i>
            </a>
        </div>
    </div>
</header>

<main class="container my-5">
    <div id="producto-detalle" class="row g-4">
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p>Cargando producto...</p>
        </div>
    </div>

    <h4 class="text-success mt-5 mb-3 border-bottom pb-2">Productos que te pueden interesar</h4>
    <div class="row g-4" id="productos-recomendados">
        <div class="text-center py-3">
            <div class="spinner-border text-success" role="status"></div>
        </div>
    </div>
</main>

<script src="/js/producto.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const token = localStorage.getItem('token');
        const btn = document.getElementById('btn-usuario');
        if (btn && token) btn.href = '/perfil.html';
    })();
</script>
</body>
</html>
