<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-bg">

<div class="auth-card">
    <div class="text-center mb-4">
        <img src="/img/logo.jpeg" alt="ALIVET" class="auth-logo">
        <h2 class="auth-title mt-2">Bienvenido de vuelta</h2>
        <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo"
                   placeholder="usuario@correo.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password"
                   placeholder="Tu contraseña" required>
        </div>
        <button type="submit" class="btn btn-agro w-100 py-2 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
        <div class="text-center mb-1">
            <a href="/recuperar.html" class="text-muted small text-decoration-none" style="color:var(--agro-green)!important">
                <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
            </a>
        </div>
    </form>

    <div class="auth-divider"><span>¿No tienes cuenta?</span></div>

    <a href="/registro.html" class="btn btn-outline-success w-100 py-2" style="border-radius:10px;">
        <i class="bi bi-person-plus me-2"></i>Crear cuenta nueva
    </a>

    <div class="text-center mt-3">
        <a href="/" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Volver a la tienda
        </a>
    </div>

    <div id="mensaje" class="alert d-none mt-3 rounded-3"></div>
</div>

<script src="/js/auth/login.js"></script>
</body>
</html>
