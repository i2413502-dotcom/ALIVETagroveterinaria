<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Promociones - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg" style="background-color: var(--agro-green);">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="/">🐄 AgroVeterinaria ALIVET</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow">
                    <div class="card-header text-white" style="background-color: var(--agro-green);">
                        <h4 class="mb-0"><i class="bi bi-megaphone"></i> Enviar Promoción por Correo</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="mensaje" class="alert d-none"></div>
                        
                        <form id="formPromocion">
                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo destinatario (opcional)</label>
                                <input type="email" class="form-control" id="correo" placeholder="Dejar vacío para enviar a todos los clientes">
                                <small class="text-muted">Si dejas este campo vacío, la promoción se enviará a todos los clientes registrados.</small>
                            </div>
                            <div class="mb-3">
                                <label for="asunto" class="form-label">Asunto del correo *</label>
                                <input type="text" class="form-control" id="asunto" placeholder="Ej: ¡Oferta especial en alimentos para perros!" required>
                            </div>
                            <div class="mb-3">
                                <label for="mensaje" class="form-label">Mensaje de la promoción *</label>
                                <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe el contenido de la promoción..." required></textarea>
                            </div>
                            <button type="submit" class="btn w-100 text-white" style="background-color: var(--agro-green);">
                                <i class="bi bi-send"></i> Enviar promoción
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/promociones.js"></script>
</body>
</html>
