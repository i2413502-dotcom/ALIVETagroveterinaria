<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - AgroVeterinaria ALIVET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4 text-center">
                        <h4 class="mb-3">Verifica tu correo</h4>
                        <p class="text-muted">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
                        <input type="text" id="otp" class="form-control form-control-lg text-center mb-3" 
                               placeholder="000000" maxlength="6" pattern="\d{6}">
                        <button class="btn btn-success w-100 mb-2" onclick="verifyOtp()">Verificar código</button>
                        <button class="btn btn-link btn-sm" onclick="reenviar()">Reenviar código</button>
                        <p id="mensaje" class="mt-2"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const pendingId = localStorage.getItem('pendingId');

        async function verifyOtp() {
            const otp = document.getElementById('otp').value;
            const msg = document.getElementById('mensaje');
            
            if (!otp || otp.length !== 6) {
                msg.innerHTML = '<span class="text-danger">Ingresa un código válido de 6 dígitos</span>';
                return;
            }

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pendingId, otp })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('rol', data.rol);
                    localStorage.setItem('nombre', data.nombre);
                    window.location.href = '/index.html';
                } else {
                    msg.innerHTML = `<span class="text-danger">${data.mensaje}</span>`;
                }
            } catch (err) {
                msg.innerHTML = '<span class="text-danger">Error de conexión</span>';
            }
        }

        function reenviar() {
            window.history.back();
        }
    </script>
</body>
</html>
